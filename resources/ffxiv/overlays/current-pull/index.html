<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hydaelyn Current pull</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hydaelyn-current-pull">
    <div class="current-pull-label">Encounter</div>
    <div id="pull-title" class="current-pull-value empty-state">Waiting for ACT…</div>
    <div class="current-pull-label" style="margin-top: 6px;">Duration</div>
    <div id="pull-duration" class="current-pull-value">—</div>
    <div class="current-pull-label" style="margin-top: 6px;">Total DPS</div>
    <div id="pull-dps" class="current-pull-value dps">—</div>
  </div>
  <script src="https://overlayplugin.github.io/OverlayPlugin/assets/shared/common.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
