<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hydaelyn ACT Ingest</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 0.5rem;
      background: rgba(0,0,0,0.7);
      color: #e0e0e0;
      font-size: 0.875rem;
    }
    .status { font-weight: 600; }
    .status.ok { color: #4ade80; }
    .status.sending { color: #fbbf24; }
    .status.error { color: #f87171; }
    .hint { color: #888; margin-top: 0.5rem; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div id="status" class="status">Waiting for ACT…</div>
  <div class="hint">Add ?token=YOUR_OVERLAY_TOKEN to the URL. Get the token from the Hydaelyn dashboard.</div>
  <script src="https://overlayplugin.github.io/OverlayPlugin/assets/shared/common.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
