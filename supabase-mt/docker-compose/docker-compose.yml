version: '3.8'

# Load .env from this directory (copy from .env.example).
# For local dev, merge .env.local.example values into .env or run ./scripts/start-local.sh

services:
  # PostgreSQL Database (for Flowise and n8n - not Supabase MT)
  postgres:
    image: postgres:15-alpine
    container_name: mood_mnky_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mood_mnky}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      # Performance optimizations
      POSTGRES_INITDB_ARGS: -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=16MB -c min_wal_size=2GB -c max_wal_size=4GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mood_mnky_network
    # Better resource management
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '1.5'
    restart: unless-stopped
    # Enable restart policy backoff
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mood_mnky_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mood_mnky_network
    mem_limit: 256m
    memswap_limit: 256m
    cpus: '0.5'
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  # MinIO (S3-compatible object storage)
  minio:
    image: cgr.dev/chainguard/minio:latest
    container_name: mood_mnky_minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - minio_data:/data
    networks:
      - mood_mnky_network
    mem_limit: 256m
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # One-time bucket creation for MinIO
  minio-createbucket:
    image: cgr.dev/chainguard/minio-client:latest
    container_name: mood_mnky_minio_createbucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -ec "
      mc alias set moodminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing moodminio/$${FLOWISE_S3_BUCKET:-flowise-artifacts} &&
      mc mb --ignore-existing moodminio/$${N8N_S3_BUCKET:-n8n-binaries}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLOWISE_S3_BUCKET: ${FLOWISE_S3_BUCKET:-flowise-artifacts}
      N8N_S3_BUCKET: ${N8N_S3_BUCKET:-n8n-binaries}
    networks:
      - mood_mnky_network
    restart: "no"

  # Flowise AI Platform
  flowise:
    image: flowiseai/flowise:latest
    container_name: mood_mnky_flowise
    ports:
      - "${FLOWISE_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Core database
      DATABASE_TYPE: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${FLOWISE_DB_NAME:-flowise}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      DATABASE_SSL: "false"
      # Auth
      FLOWISE_USERNAME: ${FLOWISE_USERNAME:-admin}
      FLOWISE_PASSWORD: ${FLOWISE_PASSWORD:-admin_password}
      # File upload
      FLOWISE_FILE_SIZE_LIMIT: ${FLOWISE_FILE_SIZE_LIMIT:-50mb}
      # Storage (local | s3 | gcs | azure)
      FLOWISE_STORAGE_TYPE: ${FLOWISE_STORAGE_TYPE:-local}
      # S3 / MinIO (when FLOWISE_STORAGE_TYPE=s3)
      FLOWISE_S3_STORAGE_BUCKET_NAME: ${FLOWISE_S3_BUCKET:-flowise-artifacts}
      FLOWISE_S3_ENDPOINT_URL: http://minio:9000
      FLOWISE_S3_FORCE_PATH_STYLE: "true"
      FLOWISE_S3_STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      FLOWISE_S3_STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Redis cache
      CACHE_TYPE: redis
      CACHE_REDIS_URL: redis://:@redis:6379
      # Security
      FLOWISE_SECRETKEY_STORAGE_TYPE: ${FLOWISE_SECRETKEY_STORAGE_TYPE:-local}
      # Logging
      DEBUG: ${FLOWISE_DEBUG:-false}
      LOG_LEVEL: ${FLOWISE_LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-createbucket:
        condition: service_completed_successfully
    volumes:
      - flowise_data:/root/.flowise
    networks:
      - mood_mnky_network
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: mood_mnky_n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    env_file:
      - .env
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      DB_POSTGRESDB_SSL: "false"
      DB_POSTGRESDB_SCHEMA: ${DB_POSTGRESDB_SCHEMA:-public}
      DB_POSTGRESDB_POOL_SIZE: ${DB_POSTGRESDB_POOL_SIZE:-2}
      # Core
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      # Auth
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-admin_password}
      # Redis queue
      QUEUE_TYPE: redis
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Executions
      EXECUTIONS_PROCESS: ${EXECUTIONS_PROCESS:-main}
      EXECUTIONS_TIMEOUT: ${EXECUTIONS_TIMEOUT:-3600}
      EXECUTIONS_MAX_TIMEOUT: ${EXECUTIONS_MAX_TIMEOUT:-86400}
      # Binary data (optional S3 / MinIO)
      BINARYDATA_STORAGE_TYPE: ${BINARYDATA_STORAGE_TYPE:-filesystem}
      BINARYDATA_S3_ENDPOINT: http://minio:9000
      BINARYDATA_S3_BUCKET: ${N8N_S3_BUCKET:-n8n-binaries}
      BINARYDATA_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      BINARYDATA_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BINARYDATA_S3_FORCE_PATH_STYLE: "true"
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-createbucket:
        condition: service_completed_successfully
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - mood_mnky_network
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

networks:
  mood_mnky_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-mood_mnky
      com.docker.network.bridge.enable_icc: "true"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  flowise_data:
    driver: local
  n8n_data:
    driver: local
