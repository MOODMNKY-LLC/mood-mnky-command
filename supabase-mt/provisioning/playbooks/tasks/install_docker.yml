---
# Install Docker and Docker Compose plugin on Debian/Ubuntu.

- name: Install Docker dependencies
  ansible.builtin.apt:
    name: ["ca-certificates", "curl", "gnupg"]
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker CE and Compose plugin
  ansible.builtin.apt:
    name: ["docker-ce", "docker-ce-cli", "containerd.io", "docker-buildx-plugin", "docker-compose-plugin"]
    state: present
    update_cache: true

- name: Ensure Docker service is started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
