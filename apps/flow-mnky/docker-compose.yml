version: '3.8'

services:
  # MinIO S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: minio-dev
    ports:
      - "9000:9000"      # MinIO API
      - "9001:9001"      # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin-password
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Initialize MinIO buckets
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_minio: http://minioadmin:minioadmin-password@minio:9000
    entrypoint: >
      /bin/sh -c "
      mc mb minio/chat-images;
      mc mb minio/chat-documents;
      mc mb minio/chat-knowledge-base;
      mc mb minio/chat-projects;
      echo 'MinIO buckets created successfully'
      "

  # Next.js application
  next-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai-chat-flowise
    ports:
      - "3000:3000"
    environment:
      # Flowise Configuration
      FLOWISE_API_URL: https://flowise-dev.moodmnky.com/api/v1
      FLOWISE_API_KEY: ${FLOWISE_API_KEY:-}
      FLOWISE_CHATFLOW_ID: ${FLOWISE_CHATFLOW_ID:-}
      FLOWISE_STREAMING_ENABLED: "true"

      # MinIO Configuration
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin-password
      MINIO_REGION: us-east-1
      
      # MinIO Buckets
      MINIO_IMAGES_BUCKET: chat-images
      MINIO_DOCUMENTS_BUCKET: chat-documents
      MINIO_KNOWLEDGE_BUCKET: chat-knowledge-base
      MINIO_PROJECTS_BUCKET: chat-projects

      # Context7 MCP
      CONTEXT7_MCP_URL: https://mcp.context7.com/mcp
      CONTEXT7_MCP_ENABLED: "true"
      CONTEXT7_CACHE_TTL: "3600"

      # AI SDK (required - provide at least one)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}

      # Feature Flags
      USE_FLOWISE_FALLBACK: "true"
      ENABLE_MINIO_STORAGE: "true"
      ENABLE_CONTEXT7_MCP: "true"

      # Node environment
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      minio:
        condition: service_healthy
    command: npm run dev

volumes:
  minio-data:
    driver: local

networks:
  default:
    name: ai-chat-network
